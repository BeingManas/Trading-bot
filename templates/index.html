<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingBot — Binance Futures Testnet</title>
    <meta name="description" content="Professional trading dashboard for Binance Futures Testnet with live charts, order book, and real-time execution.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">TB</div>
                <div class="logo-text">Trading<span>Bot</span></div>
            </div>
            <nav class="nav-tabs">
                <button class="nav-tab active">Futures</button>
                <button class="nav-tab">Spot</button>
            </nav>
        </div>
        <div class="header-right">
            <div class="badge">
                <span class="status-dot"></span>
                TESTNET LIVE
            </div>
        </div>
    </header>

    <!-- ===== TICKER BAR ===== -->
    <div class="ticker-bar">
        <div class="ticker-item active" id="ticker-BTCUSDT" onclick="selectSymbol('BTCUSDT')">
            <span class="ticker-symbol">BTC/USDT</span>
            <span class="ticker-price" style="color:var(--text-secondary)">—</span>
            <span class="ticker-change">—</span>
            <span class="ticker-vol"></span>
        </div>
        <div class="ticker-item" id="ticker-ETHUSDT" onclick="selectSymbol('ETHUSDT')">
            <span class="ticker-symbol">ETH/USDT</span>
            <span class="ticker-price" style="color:var(--text-secondary)">—</span>
            <span class="ticker-change">—</span>
            <span class="ticker-vol"></span>
        </div>
        <div class="ticker-item" id="ticker-BNBUSDT" onclick="selectSymbol('BNBUSDT')">
            <span class="ticker-symbol">BNB/USDT</span>
            <span class="ticker-price" style="color:var(--text-secondary)">—</span>
            <span class="ticker-change">—</span>
            <span class="ticker-vol"></span>
        </div>
        <div class="ticker-item" id="ticker-SOLUSDT" onclick="selectSymbol('SOLUSDT')">
            <span class="ticker-symbol">SOL/USDT</span>
            <span class="ticker-price" style="color:var(--text-secondary)">—</span>
            <span class="ticker-change">—</span>
            <span class="ticker-vol"></span>
        </div>
        <div class="ticker-item" id="ticker-XRPUSDT" onclick="selectSymbol('XRPUSDT')">
            <span class="ticker-symbol">XRP/USDT</span>
            <span class="ticker-price" style="color:var(--text-secondary)">—</span>
            <span class="ticker-change">—</span>
            <span class="ticker-vol"></span>
        </div>
    </div>

    <!-- ===== MAIN GRID ===== -->
    <div class="main-grid">

        <!-- ===== CHART AREA ===== -->
        <div class="chart-area">
            <div class="chart-header">
                <div class="chart-symbol-info">
                    <span class="chart-symbol-name" id="chart-symbol-name">BTC/USDT</span>
                    <span class="chart-live-price" id="chart-live-price">—</span>
                    <span class="chart-price-change" id="chart-price-change">—</span>
                </div>
                <div class="chart-stats">
                    <div class="chart-stat">
                        <span class="chart-stat-label">24h High</span>
                        <span class="chart-stat-value" id="stat-high">—</span>
                    </div>
                    <div class="chart-stat">
                        <span class="chart-stat-label">24h Low</span>
                        <span class="chart-stat-value" id="stat-low">—</span>
                    </div>
                    <div class="chart-stat">
                        <span class="chart-stat-label">24h Volume</span>
                        <span class="chart-stat-value" id="stat-vol">—</span>
                    </div>
                </div>
                <div class="chart-intervals">
                    <button class="interval-btn" onclick="setInterval_('1m')">1m</button>
                    <button class="interval-btn" onclick="setInterval_('5m')">5m</button>
                    <button class="interval-btn" onclick="setInterval_('15m')">15m</button>
                    <button class="interval-btn active" onclick="setInterval_('1h')">1H</button>
                    <button class="interval-btn" onclick="setInterval_('4h')">4H</button>
                    <button class="interval-btn" onclick="setInterval_('1d')">1D</button>
                </div>
            </div>
            <div class="chart-container" id="chart-container"></div>
        </div>

        <!-- ===== RIGHT PANEL (Trade + Order Book) ===== -->
        <div class="right-panel">
            <div class="panel-tabs">
                <button class="panel-tab active" onclick="showPanel('trade')">Trade</button>
                <button class="panel-tab" onclick="showPanel('book')">Order Book</button>
            </div>

            <!-- Trade Form -->
            <div id="order-form-panel" class="order-form-wrapper">
                <form id="orderForm">
                    <!-- Side Toggle -->
                    <div class="side-toggle">
                        <button type="button" class="side-btn buy active" onclick="setSide('BUY')">BUY / LONG</button>
                        <button type="button" class="side-btn sell" onclick="setSide('SELL')">SELL / SHORT</button>
                    </div>

                    <!-- Type Toggle -->
                    <div class="type-toggle">
                        <button type="button" class="type-btn active" onclick="setType('MARKET')">Market</button>
                        <button type="button" class="type-btn" onclick="setType('LIMIT')">Limit</button>
                    </div>

                    <!-- Symbol -->
                    <div class="form-group">
                        <label>Symbol</label>
                        <select id="symbol-select" onchange="selectSymbol(this.value)">
                            <option value="BTCUSDT">BTC / USDT</option>
                            <option value="ETHUSDT">ETH / USDT</option>
                            <option value="BNBUSDT">BNB / USDT</option>
                            <option value="SOLUSDT">SOL / USDT</option>
                            <option value="XRPUSDT">XRP / USDT</option>
                        </select>
                    </div>

                    <!-- Price (LIMIT only) -->
                    <div class="form-group" id="priceGroup" style="display:none;">
                        <label>Price (USDT)</label>
                        <input type="number" id="price" step="any" placeholder="Limit price">
                    </div>

                    <!-- Quantity -->
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="quantity" step="any" value="0.001" placeholder="Amount">
                        <div class="qty-shortcuts">
                            <button type="button" class="qty-shortcut" onclick="setQtyPercent(25)">25%</button>
                            <button type="button" class="qty-shortcut" onclick="setQtyPercent(50)">50%</button>
                            <button type="button" class="qty-shortcut" onclick="setQtyPercent(75)">75%</button>
                            <button type="button" class="qty-shortcut" onclick="setQtyPercent(100)">100%</button>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="submit-btn buy" id="submitBtn">BUY / LONG</button>
                </form>
            </div>

            <!-- Order Book -->
            <div id="order-book-panel" class="order-book" style="display:none;">
                <div class="ob-header">
                    <span>Price</span>
                    <span>Size</span>
                    <span>Total</span>
                </div>
                <div id="ob-asks"></div>
                <div class="ob-spread" id="ob-spread">Spread: —</div>
                <div id="ob-bids"></div>
            </div>
        </div>

        <!-- ===== BOTTOM PANEL (Order History) ===== -->
        <div class="bottom-panel">
            <div class="bottom-tabs">
                <button class="bottom-tab active">
                    Order History
                    <span class="count" id="orderCount">0</span>
                </button>
            </div>
            <div class="history-table-wrap">
                <div id="emptyState" class="empty-state">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                        <rect x="9" y="3" width="6" height="4" rx="1"/>
                        <path d="M9 14h6M9 18h6"/>
                    </svg>
                    <p>No orders placed yet</p>
                </div>
                <table class="history-table" id="historyTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Symbol</th>
                            <th>Side</th>
                            <th>Type</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toasts"></div>

    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- App JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
